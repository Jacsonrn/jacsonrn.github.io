<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Assets - Seletor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header style="padding: 20px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 1.5rem; font-weight: bold;">📂 Banco de Assets</div>
        <a href="index.html" style="color: #ccc;">&larr; Voltar</a>
    </header>

    <!-- Filtros -->
    <div style="padding: 20px; text-align: center;">
        <button onclick="filterGallery('all')" class="btn-enter" style="padding: 8px 20px; margin: 5px; font-size: 0.9rem;">Todos</button>
        <button onclick="filterGallery('video')" class="btn-enter" style="padding: 8px 20px; margin: 5px; font-size: 0.9rem;">Vídeos</button>
        <button onclick="filterGallery('audio')" class="btn-enter" style="padding: 8px 20px; margin: 5px; font-size: 0.9rem;">Áudios</button>
        <button onclick="filterGallery('image')" class="btn-enter" style="padding: 8px 20px; margin: 5px; font-size: 0.9rem;">Imagens</button>
    </div>

    <div id="gallery" class="gallery-grid">
        <p style="grid-column: 1/-1; text-align: center;">Carregando assets do Drive...</p>
    </div>

    <script>
        let allAssets = [];

        // Função para converter link de visualização do Drive em link direto de imagem (thumbnail)
        function getDriveThumbnail(url) {
            // Extrai ID
            const idMatch = url.match(/id=([a-zA-Z0-9_-]+)/) || url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (idMatch) {
                return `https://lh3.googleusercontent.com/d/${idMatch[1]}=s400`; // s400 pede largura 400px
            }
            return 'https://via.placeholder.com/400x250?text=No+Preview';
        }

        async function loadManifest() {
            try {
                // Lê o arquivo manifest.json que deve estar na mesma pasta
                const response = await fetch('manifest.json');
                if (!response.ok) throw new Error("Manifesto não encontrado");
                
                const data = await response.json();
                allAssets = [];

                // Processa as categorias do seu JSON (Adaptar conforme a estrutura real do seu manifest.json)
                // Assumindo estrutura: { "visuals": [...], "musica": [...], "sfx": [...] }
                
                if (data.visuals) {
                    data.visuals.forEach(item => allAssets.push({...item, type: 'video', category: 'Visuals'}));
                }
                if (data.musica) {
                    data.musica.forEach(item => allAssets.push({...item, type: 'audio', category: 'Música'}));
                }
                if (data.sfx) {
                    data.sfx.forEach(item => allAssets.push({...item, type: 'audio', category: 'SFX'}));
                }

                renderGallery(allAssets);

            } catch (error) {
                document.getElementById('gallery').innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: red;">Erro ao carregar assets: ${error.message}. <br>Certifique-se de que o arquivo <b>manifest.json</b> está na pasta do site.</p>`;
            }
        }

        function renderGallery(items) {
            const container = document.getElementById('gallery');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Nenhum item encontrado.</p>';
                return;
            }

            items.forEach(item => {
                // Define ícone ou thumb baseado no tipo
                let thumbUrl = 'https://via.placeholder.com/400x250?text=Audio';
                if (item.type === 'video' || item.type === 'image') {
                    // Tenta usar o próprio link se for imagem direta, ou thumbnail do drive
                    thumbUrl = getDriveThumbnail(item.path || item.url); 
                }

                const card = document.createElement('div');
                card.className = 'media-card';
                card.innerHTML = `
                    <img src="${thumbUrl}" class="media-thumb" alt="${item.name}" loading="lazy">
                    <div class="media-info">
                        <span class="media-title">${item.name}</span>
                        <span class="media-tag">${item.category}</span>
                        <a href="${item.path || item.url}" target="_blank" class="btn-download">Baixar / Ver</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterGallery(type) {
            if (type === 'all') {
                renderGallery(allAssets);
            } else {
                const filtered = allAssets.filter(item => item.type === type || (type === 'video' && item.category === 'Visuals'));
                renderGallery(filtered);
            }
        }

        // Inicia
        loadManifest();
    </script>
</body>
</html>
